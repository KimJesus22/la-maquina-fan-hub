        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

<body class="bg-background text-on-background min-h-screen relative overflow-hidden font-body-md text-body-md">
<!-- Background Landing Page Mockup (Blurred) -->
<div class="absolute inset-0 z-0">
<!-- Top Nav Mockup -->
<header class="flex justify-between items-center w-full px-6 py-4 sticky top-0 z-50 bg-white/90 backdrop-blur-sm border-b border-slate-200 shadow-lg">
<div class="text-2xl font-black italic text-primary-container">CRUZ AZUL PORTAL</div>
<nav class="hidden md:flex gap-6">
<a class="font-['Lexend'] font-bold uppercase tracking-tighter text-slate-500 hover:text-tertiary-container transition-colors duration-200" href="#">Partidos</a>
<a class="font-['Lexend'] font-bold uppercase tracking-tighter text-slate-500 hover:text-tertiary-container transition-colors duration-200" href="#">Noticias</a>
<a class="font-['Lexend'] font-bold uppercase tracking-tighter text-slate-500 hover:text-tertiary-container transition-colors duration-200" href="#">Plantel</a>
</nav>
</header>
<!-- Hero Section Mockup -->
<main class="relative h-screen w-full flex items-center justify-center bg-primary-container bg-cover bg-center" data-alt="packed soccer stadium at night with bright floodlights shining on the green pitch and cheering fans in the stands" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAFZgcjt6YV46JzDvBWm4r4mHT7BH3Izm4913UMtB1cLQ7rEKQcOlp49BLfqgfXZiwytnuNGB8_kTq_Kfg0xs0_eX7lhRgaqBRbHkVZZTBN8HI_T0kFtgESnSN4i-okiwieGePV6v8qOG5rYLtjyrCAcjW6Q5wVhlZSkisxaGDwh4mqaZTNhlpoy0hOc43-uLYM5mZ5qWALXcZDZ98PykCJVIIc9ra8NZb0p42bbP0EArJPmn3rgViuTLDeKDUBRf-NPl_yRsyno1XS');">
<div class="absolute inset-0 bg-gradient-to-t from-primary to-transparent opacity-80"></div>
<div class="relative z-10 text-center px-4">
<h1 class="font-display-2xl text-display-2xl text-on-primary mb-4 uppercase tracking-tighter">LA PASIÓN NOS UNE</h1>
</div>
</main>
</div>
<!-- Overlay & Modal -->
<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-md p-4">
<!-- Auth Card -->
<div class="bg-surface w-full max-w-md rounded-xl shadow-[0_20px_50px_rgba(0,27,61,0.5)] overflow-hidden flex flex-col relative border border-outline-variant/30">
<!-- Close Button (Decorative) -->
<button class="absolute top-4 right-4 text-outline hover:text-on-surface transition-colors p-2 rounded-full hover:bg-surface-variant">
<span class="material-symbols-outlined">close</span>
</button>
<!-- Header -->
<div class="px-8 pt-10 pb-6 text-center">
<div class="w-16 h-16 mx-auto bg-primary-container rounded-full flex items-center justify-center mb-6 shadow-md border-2 border-surface">
<!-- Generic Sports Logo Icon placeholder for Cruz Azul Logo -->
<span class="material-symbols-outlined text-on-primary text-3xl" style="font-variation-settings: 'FILL' 1;">sports_soccer</span>
</div>
<h2 class="font-headline-md text-headline-md text-primary tracking-tight">Bienvenido de nuevo</h2>
<p class="font-body-md text-body-md text-on-surface-variant mt-2">Ingresa a tu cuenta para continuar</p>
</div>
<!-- Form -->
<div class="px-8 pb-8 flex-1">
<form class="flex flex-col gap-5">
<!-- Email Field -->
<div class="relative group">
<div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-outline group-focus-within:text-primary-container transition-colors">
<span class="material-symbols-outlined text-xl">mail</span>
</div>
<input class="block w-full pl-12 pr-4 py-4 bg-surface-container-low border border-outline-variant rounded-lg text-on-surface font-body-md focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-transparent transition-all peer placeholder-transparent" id="email" placeholder="Correo Electrónico" type="email" value="fan@cruzazul.mx"/>
<label class="absolute left-12 top-4 text-on-surface-variant font-body-md transition-all peer-focus:-top-2 peer-focus:text-xs peer-focus:bg-surface peer-focus:px-1 peer-focus:text-primary-container peer-valid:-top-2 peer-valid:text-xs peer-valid:bg-surface peer-valid:px-1" for="email">Correo Electrónico</label>
</div>
<!-- Password Field (Error State Example) -->
<div class="relative group">
<div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-error group-focus-within:text-error transition-colors">
<span class="material-symbols-outlined text-xl">lock</span>
</div>
<!-- Using explicit generic styling for the error border as requested by instructions to stick to theme tokens -->
<input class="block w-full pl-12 pr-12 py-4 bg-error-container/20 border-2 border-error rounded-lg text-on-surface font-body-md focus:outline-none focus:ring-2 focus:ring-error focus:border-transparent transition-all peer placeholder-transparent" id="password" placeholder="Contraseña" type="password" value="••••••••"/>
<label class="absolute left-12 top-4 text-error font-body-md transition-all -top-2 text-xs bg-surface px-1" for="password">Contraseña</label>
<button class="absolute inset-y-0 right-0 flex items-center pr-4 text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-xl">visibility_off</span>
</button>
</div>
<!-- Error Hint -->
<p class="font-label-md text-label-md text-error flex items-center gap-1 mt-1">
<span class="material-symbols-outlined text-[14px]">error</span>
                        La contraseña es incorrecta.
                    </p>
<!-- Forgot Password Link -->
<div class="flex justify-end">
<a class="font-label-md text-label-md text-primary-container hover:text-primary underline-offset-2 hover:underline transition-all" href="#">¿Olvidaste tu contraseña?</a>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary-container text-on-primary py-4 rounded-lg font-headline-lg text-headline-lg text-[18px] uppercase tracking-wide shadow-md hover:bg-primary transition-all hover:-translate-y-1 active:translate-y-0 mt-2 flex items-center justify-center gap-2 border-r-4 border-tertiary-container" type="button">
                        Iniciar Sesión
                        <span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="flex items-center my-8">
<div class="flex-grow border-t border-outline-variant/50"></div>
<span class="px-4 font-label-md text-label-md text-outline bg-surface">O continúa con</span>
<div class="flex-grow border-t border-outline-variant/50"></div>
</div>
<!-- Social Logins -->
<div class="flex flex-col gap-3">
<button class="w-full flex items-center justify-center gap-3 py-3 border border-outline-variant rounded-lg bg-surface hover:bg-surface-container-low transition-colors text-on-surface font-label-md text-label-md shadow-sm" type="button">
<!-- Custom Google G using standard HTML/CSS shapes to avoid SVGs per instructions implicitly (keep it clean) -->
<span class="font-bold text-lg text-red-500">G</span>
                        Google
                    </button>
<button class="w-full flex items-center justify-center gap-3 py-3 border border-outline-variant rounded-lg bg-[#5865F2] hover:bg-[#4752C4] transition-colors text-white font-label-md text-label-md shadow-sm" type="button">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">forum</span>
                        Discord
                    </button>
</div>
</div>
<!-- Footer -->
<div class="bg-surface-container-low p-6 text-center border-t border-outline-variant/30">
<p class="font-body-md text-body-md text-on-surface-variant">
                    ¿No tienes cuenta? 
                    <a class="font-label-md text-label-md text-primary-container hover:text-tertiary-container hover:underline transition-colors ml-1" href="#">Regístrate</a>
</p>
</div>
</div>
</div>
</body></html>
